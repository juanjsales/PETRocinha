<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Impacto Gerencial | Profissão Pet</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #003366;
            --secondary: #e91e63;
            --accent: #ffcc00;
            --success: #28a745;
            --bg: #f4f6f9;
            --card-bg: #ffffff;
            --text: #2d3748;
            --text-muted: #718096;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header e Controles */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .title-area h1 { font-size: 1.8rem; color: var(--primary); font-weight: 800; }
        .title-area p { color: var(--text-muted); font-size: 0.9rem; }

        .btn-print {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0, 51, 102, 0.2);
        }

        .btn-print:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0, 51, 102, 0.3); }

        /* Cards de Métricas Principais */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.03);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-info h3 { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .card-info .value { font-size: 1.8rem; font-weight: 700; color: var(--primary); margin-top: 5px; }
        .card-icon { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
        
        .icon-1 { background: rgba(0, 51, 102, 0.1); color: var(--primary); }
        .icon-2 { background: rgba(233, 30, 99, 0.1); color: var(--secondary); }
        .icon-3 { background: rgba(40, 167, 69, 0.1); color: var(--success); }
        .icon-4 { background: rgba(255, 204, 0, 0.15); color: #d4a300; }

        /* Barra de Filtros */
        .filter-bar {
            background: var(--card-bg);
            padding: 18px 24px;
            border-radius: 14px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-bar label { font-size: 0.85rem; font-weight: 600; color: var(--text); }
        
        .filter-select {
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background-color: var(--bg);
            color: var(--text);
            font-size: 0.9rem;
            min-width: 180px;
            outline: none;
            cursor: pointer;
        }

        /* Tabela Gerencial */
        .table-container {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 18px rgba(0,0,0,0.03);
            overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; }
        th { background-color: #fafbfe; padding: 16px 20px; color: var(--text-muted); font-weight: 600; border-bottom: 1px solid var(--border); }
        td { padding: 16px 20px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
        tr:hover { background-color: #fcfdfe; }

        /* Badges customizadas baseadas no seu fluxo */
        .badge {
            padding: 6px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .b-curiosa { background-color: #e2f0fd; color: #0066cc; }
        .b-proposito { background-color: #e6fffa; color: #00a389; }
        .b-tecnica { background-color: #fffaf0; color: #dd6b20; }
        .b-embaixadora { background-color: #fff5f5; color: #e53e3e; }

        /* Responsividade */
        @media (max-width: 768px) {
            .dashboard-header { flex-direction: column; align-items: flex-start; }
            .btn-print { width: 100%; justify-content: center; }
            .filter-bar { flex-direction: column; align-items: stretch; }
            .filter-select { width: 100%; }
        }

        /* 🖨️ CONFIGURAÇÃO EXCLUSIVA DE IMPRESSÃO (PRINT CSS) */
        @media print {
            body { background: white; padding: 0; color: black; }
            .btn-print, .filter-bar { display: none !important; }
            .card { box-shadow: none; border: 1px solid #ccc; }
            .table-container { box-shadow: none; border: none; }
            th { background: #eee !important; color: black; }
            .dashboard-header { margin-bottom: 15px; }
        }
    </style>
</head>
<body>

    <header class="dashboard-header">
        <div class="title-area">
            <h1><i class="fa-solid fa-chart-pie"></i> Painel de Impacto Social</h1>
            <p>Métricas em tempo real • Projeto Profissão Pet Rocinha</p>
        </div>
        <button class="btn-print" onclick="window.print()">
            <i class="fa-solid fa-print"></i> Gerar Relatório (PDF / Impressão)
        </button>
    </header>

    <section class="metrics-grid">
        <div class="card">
            <div class="card-info">
                <h3>Total Alunas</h3>
                <div class="value" id="count-total">0</div>
            </div>
            <div class="card-icon icon-1"><i class="fa-solid fa-users"></i></div>
        </div>
        <div class="card">
            <div class="card-info">
                <h3>Moeda Social Circulante</h3>
                <div class="value" id="count-arrasas">0 AS</div>
            </div>
            <div class="card-icon icon-2"><i class="fa-solid fa-coins"></i></div>
        </div>
        <div class="card">
            <div class="card-info">
                <h3>Formadas (Curso)</h3>
                <div class="value" id="count-formadas">0</div>
            </div>
            <div class="card-icon icon-3"><i class="fa-solid fa-graduation-cap"></i></div>
        </div>
        <div class="card">
            <div class="card-info">
                <h3>Embaixadoras</h3>
                <div class="value" id="count-embaixadoras">0</div>
            </div>
            <div class="card-icon icon-4"><i class="fa-solid fa-crown"></i></div>
        </div>
    </section>

    <section class="filter-bar">
        <i class="fa-solid fa-filter" style="color: var(--text-muted)"></i>
        <label for="filter-bairro">Filtrar por Região/Bairro:</label>
        <select id="filter-bairro" class="filter-select" onchange="filtrarDados()">
            <option value="todos">Todos os locais</option>
            <option value="Rocinha (Via Ápia)">Rocinha (Via Ápia)</option>
            <option value="Rocinha (Valão)">Rocinha (Valão)</option>
            <option value="Manguinhos">Manguinhos</option>
        </select>

        <label for="filter-badge">Filtrar por Medalha:</label>
        <select id="filter-badge" class="filter-select" onchange="filtrarDados()">
            <option value="todas">Todas as Medalhas</option>
            <option value="Aprendiz Curiosa">Aprendiz Curiosa</option>
            <option value="Mulher de Propósito">Mulher de Propósito</option>
            <option value="Fera da Técnica">Fera da Técnica</option>
            <option value="Embaixadora Pet">Embaixadora Pet</option>
        </select>
    </section>

    <section class="table-container">
        <table id="alunas-table">
            <thead>
                <tr>
                    <th>Nome da Aluna</th>
                    <th>Localidade</th>
                    <th>Renda Familiar</th>
                    <th>Saldo Arrasas</th>
                    <th>Medalha Atual</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
    </section>

    <script>
        // Simulando a estrutura de dados que vem do seu Google Sheets
        const dadosAlunas = [
            { nome: "Maria Silva", localidade: "Rocinha (Via Ápia)", renda: "Menos de 1 Salário", arrasas: 20, badge: "Aprendiz Curiosa", badgeClass: "b-curiosa", icone: "🐾" },
            { nome: "Aline Souza", localidade: "Rocinha (Valão)", renda: "De 1 a 2 Salários", arrasas: 40, badge: "Mulher de Propósito", badgeClass: "b-proposito", icone: "✨" },
            { nome: "Beatriz Santos", localidade: "Manguinhos", renda: "Menos de 1 Salário", arrasas: 120, badge: "Fera da Técnica", badgeClass: "b-tecnica", icone: "🎓" },
            { nome: "Camila Oliveira", localidade: "Rocinha (Via Ápia)", renda: "Menos de 1 Salário", arrasas: 250, badge: "Embaixadora Pet", badgeClass: "b-embaixadora", icone: "👑" },
            { nome: "Juliana Costa", localidade: "Rocinha (Valão)", renda: "Não declarada", arrasas: 20, badge: "Aprendiz Curiosa", badgeClass: "b-curiosa", icone: "🐾" }
        ];

        // Função para carregar dados e calcular métricas agregadas
        function renderizarDashboard(lista) {
            const tbody = document.getElementById("table-body");
            tbody.innerHTML = "";

            let totalArrasas = 0;
            let formadas = 0;
            let embaixadoras = 0;

            lista.forEach(aluna => {
                totalArrasas += aluna.arrasas;
                if(aluna.badge === "Fera da Técnica") formadas++;
                if(aluna.badge === "Embaixadora Pet") embaixadoras++;

                let row = `<tr>
                    <td><strong>${aluna.nome}</strong></td>
                    <td>${aluna.localidade}</td>
                    <td><span style="color:var(--text-muted)">${aluna.renda}</span></td>
                    <td><strong>${aluna.arrasas} AS</strong></td>
                    <td><span class="badge ${aluna.badgeClass}">${aluna.icone} ${aluna.badge}</span></td>
                </tr>`;
                tbody.innerHTML += row;
            });

            // Atualiza os cards lá em cima
            document.getElementById("count-total").innerText = lista.length;
            document.getElementById("count-arrasas").innerText = totalArrasas;
            document.getElementById("count-formadas").innerText = formadas;
            document.getElementById("count-embaixadoras").innerText = embaixadoras;
        }

        // Sistema de filtro combinado (Bairro + Medalha)
        function filtrarDados() {
            const bairroSel = document.getElementById("filter-bairro").value;
            const badgeSel = document.getElementById("filter-badge").value;

            const dadosFiltrados = dadosAlunas.filter(aluna => {
                const bateBairro = (bairroSel === "todos" || aluna.localidade === bairroSel);
                const bateBadge = (badgeSel === "todas" || aluna.badge === badgeSel);
                return bateBairro && bateBadge;
            });

            renderizarDashboard(dadosFiltrados);
        }

        // Executa ao carregar a tela pela primeira vez
        window.onload = () => {
            renderizarDashboard(dadosAlunas);
        };
    </script>
</body>
</html>
