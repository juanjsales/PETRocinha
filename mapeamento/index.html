    <script>
        let slideIndex = 0;
        const slides = document.querySelectorAll(".slide-photo");
        function showSlides() {
            slides.forEach(img => img.classList.remove("active"));
            slideIndex = (slideIndex + 1) % slides.length;
            slides[slideIndex].classList.add("active");
            setTimeout(showSlides, 4000);
        }
        if(slides.length > 0) setTimeout(showSlides, 4000);

        const scriptURL = &apos;https://script.google.com/macros/s/AKfycbwfHPXTOzLSriWPmeTJMG6M_Y5onqOB6oiyiC8VEv-kMwPSWdlwwH5qipALJsyn1PMR/exec&apos;; 
        let responses = {};

        const localidades = [&apos;Via Ápia&apos;, &apos;Largo do Boiadeiro&apos;, &apos;Caminho do Boiadeiro&apos;, &apos;Vila Verde&apos;, &apos;Laboriaux&apos;, &apos;Curva do S&apos;, &apos;Roupa Suja&apos;, &apos;Roupa Suja Baixa&apos;, &apos;Bairro Barcelos&apos;, &apos;Rua Dionéia&apos;, &apos;Cachopa&apos;, &apos;Valão&apos;, &apos;Roça&apos;, &apos;Mata Machado&apos;, &apos;Beco do 199&apos;, &apos;Toca da Onça&apos;, &apos;Lazer&apos;, &apos;Vila Cruzado&apos;, &apos;99&apos;, &apos;Canal&apos;, &apos;Parque da Cidade&apos;, &apos;Santuário&apos;, &apos;Outros&apos;];
        
        const grid = document.getElementById(&apos;locais-grid&apos;);
        localidades.forEach(loc => {
            const btn = document.createElement(&apos;button&apos;);
            btn.className = &apos;option-btn p-4 font-semibold text-gray-700 text-sm&apos;;
            btn.innerText = loc;
            btn.onclick = () => {
                if(loc === &apos;Outros&apos;) {
                    document.getElementById(&apos;outro-local-container&apos;).classList.remove(&apos;hidden&apos;);
                    grid.style.display = &apos;none&apos;;
                } else {
                    saveAndNext(&apos;territorio&apos;, loc, 4);
                }
            };
            grid.appendChild(btn);
        });

        function next(id) {
            document.querySelectorAll(&apos;.step&apos;).forEach(s => s.classList.remove(&apos;active&apos;));
            const target = document.getElementById(`step-${id}`);
            if(target) target.classList.add(&apos;active&apos;);
            
            const progMap = { 
                0:5, 1:15, 2:30, 3:45, 4:55, 5:65, 
                &apos;interessado-areas&apos;: 75, 
                &apos;pro-dados&apos;: 75, 
                &apos;pro-1&apos;: 85, &apos;pro-2&apos;: 90, 
                &apos;gasto&apos;: 95, &apos;success&apos;: 100 
            };
            document.getElementById(&apos;progress&apos;).style.width = (progMap[id] || 100) + &apos;%&apos;;

            if(id === &apos;gasto&apos;){
                const btnVoltarGasto = document.getElementById(&apos;btn-voltar-gasto&apos;);
                if(responses.relacao === &apos;Tutor&apos;) btnVoltarGasto.onclick = () => next(5);
                else if(responses.relacao === &apos;Interessado&apos;) btnVoltarGasto.onclick = () => next(&apos;interessado-areas&apos;);
                else btnVoltarGasto.onclick = () => next(&apos;pro-2&apos;);
            }

            window.scrollTo(0,0);
        }

        function saveAndNext(key, val, nextId) { responses[key] = val; next(nextId); }

        function validaLGPD() { if(!document.getElementById(&apos;lgpd&apos;).checked) return alert("Aceite os termos."); next(2); }

        function toggleOutraRede(checkbox) {
            const container = document.getElementById(&apos;container-outra-rede&apos;);
            container.classList.toggle(&apos;hidden&apos;, !checkbox.checked);
        }

        function validaContato() {
            const nome = document.getElementById(&apos;nome&apos;).value.trim();
            const zap = document.getElementById(&apos;whatsapp&apos;).value;
            const redesCheckboxes = Array.from(document.querySelectorAll(&apos;input[name="rede"]:checked&apos;));
            if(nome.length < 3 || zap.length < 14) return alert("Preencha nome e WhatsApp corretamente.");
            
            let redes = redesCheckboxes.map(r => r.value);
            if(document.getElementById(&apos;check-rede-outros&apos;).checked) {
                const outraVal = document.getElementById(&apos;input-outra-rede&apos;).value.trim();
                if(outraVal) { redes = redes.filter(r => r !== &apos;Outros&apos;); redes.push(outraVal); }
            }

            responses.nome = nome;
            responses.email = document.getElementById(&apos;email&apos;).value.trim();
            responses.whatsapp = "55" + zap.replace(/\D/g, "");
            responses.redes_sociais_pessoal = redes.join(&apos;, &apos;);
            next(3);
        }

        function salvarOutroLocal() {
            const v = document.getElementById(&apos;input-outro-local&apos;).value.trim();
            if (v.length < 2) return alert("Digite a localidade.");
            responses.territorio = v;
            next(4);
        }

        function selecionarProfissao(valor) { 
            responses.relacao = &apos;Profissional&apos;; 
            responses.profissao_especifica = valor;
            next(&apos;pro-dados&apos;);
        }

        function salvarDadosPro() {
            responses.estabelecimento = document.getElementById(&apos;nome_estabelecimento&apos;).value.trim();
            responses.instagram_profissional = document.getElementById(&apos;insta_profissional&apos;).value.trim();
            next(&apos;pro-1&apos;);
        }

        function logicaRamificacao(perfil) {
            responses.relacao = perfil;
            const temPet = responses.temPet === &apos;Sim&apos;;

            if (perfil === &apos;Interessado&apos;) {
                next(&apos;interessado-areas&apos;);
            } else if (perfil === &apos;Tutor&apos;) {
                temPet ? next(&apos;gasto&apos;) : finalizarTudo(&apos;Informou ser tutor mas sem pet&apos;);
            }
        }

        function salvarInteresse(valor) {
            if(!valor || valor.length < 2) return alert("Por favor, informe a área de interesse.");
            responses.area_interesse = valor;
            const temPet = responses.temPet === &apos;Sim&apos;;
            temPet ? next(&apos;gasto&apos;) : finalizarTudo(&apos;Não possui pet&apos;);
        }

        function salvarProFinal(f) { 
            responses.faturamento = f; 
            if (responses.temPet === &apos;Sim&apos;) {
                next(&apos;gasto&apos;);
            } else {
                finalizarTudo(&apos;Não possui pet&apos;);
            }
        }

        async function finalizarTudo(g) {
            responses.gastoMensal = g;
            next(&apos;success&apos;);
            try { 
                await fetch(scriptURL, { 
                    method: &apos;POST&apos;, 
                    mode: &apos;no-cors&apos;, 
                    headers: { &apos;Content-Type&apos;: &apos;application/json&apos; },
                    body: JSON.stringify(responses) 
                }); 
            } catch (e) { console.error("Erro no fetch:", e); }
        }

        function maskTel(i) {
            let v = i.value.replace(/\D/g, "");
            v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
            v = v.replace(/(\d)(\d{4})$/, "$1-$2");
            i.value = v;
        }
    </script>
